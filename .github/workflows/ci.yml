# path: .github/workflows/ci.yml
# CI: install + build both client and server on every push/PR.
# Extend with deployment steps using Render/Vercel CLI when ready.

name: NEETHIVAAN CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: server/package-lock.json }
      - run: npm ci
      - run: npm run build

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: client/package-lock.json }
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://neethivaan-api.onrender.com

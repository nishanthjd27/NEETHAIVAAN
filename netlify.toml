# path: client/netlify.toml
[build]
  command         = "npm run build"
  publish         = "dist"
  base            = "client"

[build.environment]
  # Set VITE_API_URL in Netlify Site Settings > Environment Variables
  # VITE_API_URL = https://neethivaan-api.onrender.com

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
